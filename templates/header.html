<style>
/* User Profile Dropdown Styles */
.user-profile-container {
    position: relative;
}

.user-avatar-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    border-radius: 50%;
    transition: all 0.2s ease;
}

.user-avatar-btn:hover {
    transform: scale(1.05);
}

.user-avatar-btn:focus {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
}

.user-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 2px 8px rgba(139, 90, 43, 0.3);
}

.avatar-initials {
    color: white;
    font-size: 0.875rem;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    text-transform: uppercase;
}

/* Dropdown Menu */
.user-dropdown {
    position: absolute;
    top: calc(100% + 12px);
    right: 0;
    width: 280px;
    background: #1a1a1a;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05);
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px) scale(0.95);
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 1000;
    overflow: hidden;
}

.user-dropdown.active {
    opacity: 1;
    visibility: visible;
    transform: translateY(0) scale(1);
}

/* Dropdown Arrow */
.user-dropdown::before {
    content: '';
    position: absolute;
    top: -6px;
    right: 16px;
    width: 12px;
    height: 12px;
    background: #1a1a1a;
    border-left: 1px solid rgba(255, 255, 255, 0.1);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    transform: rotate(45deg);
}

/* Dropdown Header */
.dropdown-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    background: linear-gradient(135deg, rgba(139, 90, 43, 0.15) 0%, rgba(139, 90, 43, 0.05) 100%);
}

.dropdown-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.avatar-initials-large {
    color: white;
    font-size: 1rem;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
}

.dropdown-user-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
}

.dropdown-username {
    color: #ffffff;
    font-size: 0.9375rem;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
}

.dropdown-email {
    color: rgba(255, 255, 255, 0.5);
    font-size: 0.8125rem;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* Dropdown Divider */
.dropdown-divider {
    height: 1px;
    background: rgba(255, 255, 255, 0.08);
    margin: 0;
}

/* Dropdown Section */
.dropdown-section {
    padding: 8px 0;
}

.dropdown-section-title {
    display: block;
    padding: 8px 16px 4px;
    color: rgba(255, 255, 255, 0.4);
    font-size: 0.6875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-family: 'Inter', sans-serif;
}

/* Dropdown Items */
.dropdown-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    color: rgba(255, 255, 255, 0.8);
    text-decoration: none;
    font-size: 0.875rem;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s ease;
    cursor: pointer;
}

.dropdown-item:hover {
    background: rgba(255, 255, 255, 0.05);
    color: #ffffff;
}

.dropdown-item svg {
    flex-shrink: 0;
    opacity: 0.7;
}

.dropdown-item:hover svg {
    opacity: 1;
}

.dropdown-item span {
    flex: 1;
}

/* Danger Item (Sign Out) */
.dropdown-item-danger {
    color: #ef4444;
    margin: 8px;
    border-radius: 8px;
}

.dropdown-item-danger:hover {
    background: rgba(239, 68, 68, 0.1);
    color: #f87171;
}

.dropdown-item-danger svg {
    opacity: 1;
}

/* Theme Switcher */
.theme-switcher {
    cursor: default;
}

.theme-switcher:hover {
    background: transparent;
}

.theme-toggle-group {
    display: flex;
    gap: 4px;
    margin-left: auto;
    background: rgba(255, 255, 255, 0.05);
    padding: 4px;
    border-radius: 8px;
}

.theme-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: rgba(255, 255, 255, 0.5);
    cursor: pointer;
    transition: all 0.15s ease;
}

.theme-btn:hover {
    color: rgba(255, 255, 255, 0.8);
    background: rgba(255, 255, 255, 0.05);
}

.theme-btn.active {
    background: rgba(139, 90, 43, 0.3);
    color: var(--primary);
}

/* Mobile Responsive */
@media (max-width: 768px) {
    .user-dropdown {
        position: fixed;
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        border-radius: 20px 20px 0 0;
        transform: translateY(100%);
    }

    .user-dropdown.active {
        transform: translateY(0);
    }

    .user-dropdown::before {
        display: none;
    }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const avatarBtn = document.getElementById('userAvatarBtn');
    const dropdown = document.getElementById('userDropdown');
    
    // Toggle dropdown
    avatarBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        const isActive = dropdown.classList.contains('active');
        dropdown.classList.toggle('active');
        avatarBtn.setAttribute('aria-expanded', !isActive);
    });
    
    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
        if (!dropdown.contains(e.target) && !avatarBtn.contains(e.target)) {
            dropdown.classList.remove('active');
            avatarBtn.setAttribute('aria-expanded', 'false');
        }
    });
    
    // Close dropdown on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && dropdown.classList.contains('active')) {
            dropdown.classList.remove('active');
            avatarBtn.setAttribute('aria-expanded', 'false');
            avatarBtn.focus();
        }
    });
    
    // Theme switcher
    const themeBtns = document.querySelectorAll('.theme-btn');
    themeBtns.forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            themeBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const theme = this.dataset.theme;
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        });
    });
    
    // Load saved theme
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    themeBtns.forEach(btn => {
        if (btn.dataset.theme === savedTheme) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
});
</script>
